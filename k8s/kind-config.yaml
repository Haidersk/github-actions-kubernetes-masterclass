kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: skillpulse

nodes:
  - role: control-plane
    image: kindest/node:v1.35.1

    extraPortMappings:

      # Application
      - containerPort: 30080
        hostPort: 8888
        protocol: TCP

      # Grafana
      - containerPort: 32000
        hostPort: 32000
        protocol: TCP

      # Prometheus
      - containerPort: 32001
        hostPort: 32001
        protocol: TCP

      # ArgoCD
      - containerPort: 32002
        hostPort: 32002
        protocol: TCP

  - role: worker
    image: kindest/node:v1.35.1

  - role: worker
    image: kindest/node:v1.35.1
